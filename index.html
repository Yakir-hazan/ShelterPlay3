<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>דמו קריין | ShelterPlay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Heebo', sans-serif;
    background: #0a0a0f;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card {
    background: #13131a;
    border: 1px solid #1e1e2e;
    border-radius: 24px;
    padding: 40px 32px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
  }

  h1 {
    font-size: 28px;
    font-weight: 900;
    color: #e63946;
    margin-bottom: 4px;
    letter-spacing: -0.5px;
  }

  .sub {
    font-size: 13px;
    color: #555;
    margin-bottom: 32px;
  }

  .texts {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 28px;
  }

  .text-btn {
    background: #1a1a24;
    border: 1px solid #2a2a3a;
    border-radius: 12px;
    padding: 14px 16px;
    color: #ccc;
    font-family: 'Heebo', sans-serif;
    font-size: 15px;
    text-align: right;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1.5;
  }

  .text-btn:hover { border-color: #e63946; color: #fff; }
  .text-btn.active {
    border-color: #e63946;
    background: #1e1018;
    color: #fff;
  }

  label {
    font-size: 12px;
    color: #555;
    display: block;
    margin-bottom: 8px;
  }

  select {
    width: 100%;
    background: #1a1a24;
    border: 1px solid #2a2a3a;
    border-radius: 10px;
    color: #fff;
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    margin-bottom: 20px;
    appearance: none;
    cursor: pointer;
  }

  .speed-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
  }

  .speed-row label { margin: 0; white-space: nowrap; }

  input[type=range] {
    flex: 1;
    accent-color: #e63946;
    cursor: pointer;
  }

  .speed-val {
    font-size: 13px;
    color: #e63946;
    font-weight: 700;
    min-width: 30px;
    text-align: center;
  }

  .play-btn {
    width: 100%;
    background: #e63946;
    border: none;
    border-radius: 14px;
    padding: 18px;
    color: #fff;
    font-family: 'Heebo', sans-serif;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .play-btn:hover { background: #c1121f; transform: translateY(-1px); }
  .play-btn:active { transform: translateY(0); }
  .play-btn.speaking { background: #457b9d; }

  .wave {
    display: none;
    align-items: center;
    gap: 3px;
    height: 20px;
  }
  .wave.active { display: flex; }
  .wave span {
    display: block;
    width: 3px;
    background: #fff;
    border-radius: 2px;
    animation: wave 0.8s ease-in-out infinite;
  }
  .wave span:nth-child(1) { height: 8px; animation-delay: 0s; }
  .wave span:nth-child(2) { height: 16px; animation-delay: 0.1s; }
  .wave span:nth-child(3) { height: 12px; animation-delay: 0.2s; }
  .wave span:nth-child(4) { height: 18px; animation-delay: 0.3s; }
  .wave span:nth-child(5) { height: 10px; animation-delay: 0.4s; }

  @keyframes wave {
    0%, 100% { transform: scaleY(0.5); }
    50% { transform: scaleY(1); }
  }

  .status {
    margin-top: 16px;
    font-size: 13px;
    color: #555;
    text-align: center;
    min-height: 20px;
  }

  .no-support {
    display: none;
    background: #2a1010;
    border: 1px solid #e63946;
    border-radius: 10px;
    padding: 12px;
    font-size: 13px;
    color: #e63946;
    text-align: center;
    margin-top: 16px;
  }
</style>
</head>
<body>
<div class="card">
  <h1>🎙️ קריין ShelterPlay</h1>
  <p class="sub">Web Speech API · חינם · ללא שרת</p>

  <div class="texts">
    <button class="text-btn active" onclick="selectText(this, 'כניסה למרחב מוגן. כניסה למרחב מוגן.')">
      🚨 כניסה למרחב מוגן
    </button>
    <button class="text-btn" onclick="selectText(this, 'אזעקה באזורך. היכנס מיד למרחב המוגן.')">
      ⚠️ אזעקה באזורך
    </button>
    <button class="text-btn" onclick="selectText(this, 'ניתן לצאת מהמרחב המוגן. האזעקה הסתיימה.')">
      ✅ ניתן לצאת
    </button>
  </div>

  <label>קול</label>
  <select id="voiceSelect"></select>

  <div class="speed-row">
    <label>מהירות</label>
    <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1"
      oninput="document.getElementById('speedVal').textContent=this.value">
    <span class="speed-val" id="speedVal">1</span>
  </div>

  <button class="play-btn" id="playBtn" onclick="speak()">
    <div class="wave" id="wave">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <span id="btnText">▶ נגן</span>
  </button>

  <div class="status" id="status"></div>
  <div class="no-support" id="noSupport">הדפדפן שלך לא תומך ב-Web Speech API</div>
</div>

<script>
let currentText = 'כניסה למרחב מוגן. כניסה למרחב מוגן.';
let voices = [];

function selectText(btn, text) {
  document.querySelectorAll('.text-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentText = text;
}

function loadVoices() {
  voices = speechSynthesis.getVoices();
  const sel = document.getElementById('voiceSelect');
  sel.innerHTML = '';

  // Hebrew voices first
  const heVoices = voices.filter(v => v.lang.startsWith('he'));
  const otherVoices = voices.filter(v => !v.lang.startsWith('he'));

  if (heVoices.length > 0) {
    const grp = document.createElement('optgroup');
    grp.label = '🇮🇱 עברית';
    heVoices.forEach((v, i) => {
      const o = document.createElement('option');
      o.value = voices.indexOf(v);
      o.textContent = v.name;
      grp.appendChild(o);
    });
    sel.appendChild(grp);
  }

  const grp2 = document.createElement('optgroup');
  grp2.label = 'אחרים';
  otherVoices.slice(0, 10).forEach(v => {
    const o = document.createElement('option');
    o.value = voices.indexOf(v);
    o.textContent = `${v.name} (${v.lang})`;
    grp2.appendChild(o);
  });
  sel.appendChild(grp2);
}

function speak() {
  if (!('speechSynthesis' in window)) {
    document.getElementById('noSupport').style.display = 'block';
    return;
  }

  speechSynthesis.cancel();

  const utt = new SpeechSynthesisUtterance(currentText);
  const sel = document.getElementById('voiceSelect');
  if (sel.value !== '') utt.voice = voices[parseInt(sel.value)];
  utt.rate = parseFloat(document.getElementById('speed').value);
  utt.lang = 'he-IL';

  const btn = document.getElementById('playBtn');
  const wave = document.getElementById('wave');
  const btnText = document.getElementById('btnText');
  const status = document.getElementById('status');

  utt.onstart = () => {
    btn.classList.add('speaking');
    wave.classList.add('active');
    btnText.textContent = 'מנגן...';
    status.textContent = '🔊 מנגן קול';
  };

  utt.onend = () => {
    btn.classList.remove('speaking');
    wave.classList.remove('active');
    btnText.textContent = '▶ נגן';
    status.textContent = '✓ הושלם';
  };

  utt.onerror = (e) => {
    btn.classList.remove('speaking');
    wave.classList.remove('active');
    btnText.textContent = '▶ נגן';
    status.textContent = 'שגיאה: ' + e.error;
  };

  speechSynthesis.speak(utt);
}

if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
} else {
  document.getElementById('noSupport').style.display = 'block';
}
</script>
</body>
</html>
