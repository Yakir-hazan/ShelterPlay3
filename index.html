<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בדיקת קול עברי</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #08080F;
  --s1: #0F0F1A;
  --s2: #141422;
  --border: rgba(255,255,255,0.07);
  --b2: rgba(255,255,255,0.13);
  --gold: #D4A843;
  --gold-bg: rgba(212,168,67,0.10);
  --gold-br: rgba(212,168,67,0.22);
  --teal: #2AB5A8;
  --teal-bg: rgba(42,181,168,0.08);
  --teal-br: rgba(42,181,168,0.22);
  --coral: #E8685A;
  --green: #34D399;
  --text: rgba(255,255,255,0.90);
  --text2: rgba(255,255,255,0.55);
  --text3: rgba(255,255,255,0.28);
  --font: 'Heebo', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  background-size: 200px;
  pointer-events: none;
  z-index: 0;
}

.card {
  position: relative;
  z-index: 1;
  background: var(--s1);
  border: 1px solid var(--b2);
  border-radius: 28px;
  padding: 32px 28px;
  width: 100%;
  max-width: 440px;
  animation: fadeUp 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

.title {
  font-size: 24px;
  font-weight: 900;
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}
.title em { color: var(--gold); font-style: normal; }

.subtitle {
  font-size: 13px;
  color: var(--text3);
  margin-bottom: 28px;
}

/* Gender buttons */
.gender-row {
  display: flex;
  gap: 10px;
  margin-bottom: 24px;
}

.gender-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 18px 12px;
  background: var(--s2);
  border: 2px solid var(--border);
  border-radius: 18px;
  cursor: pointer;
  font-family: var(--font);
  color: var(--text2);
  font-size: 13px;
  font-weight: 700;
  transition: border-color 0.15s, background 0.15s, transform 0.13s;
}
.gender-btn:active { transform: scale(0.96); }
.gender-btn.selected {
  border-color: var(--gold);
  background: var(--gold-bg);
  color: var(--gold);
}
.gender-btn.selected.female {
  border-color: var(--teal);
  background: var(--teal-bg);
  color: var(--teal);
}
.gender-icon { font-size: 32px; line-height: 1; }

/* Text area */
.text-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 8px;
}

textarea {
  width: 100%;
  background: var(--s2);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  font-family: var(--font);
  font-size: 15px;
  color: var(--text);
  resize: none;
  line-height: 1.6;
  margin-bottom: 16px;
  transition: border-color 0.15s;
  direction: rtl;
}
textarea:focus { outline: none; border-color: var(--gold); }

/* Presets */
.presets-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 8px;
}
.presets-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 20px;
}
.preset-chip {
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 5px 10px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  cursor: pointer;
  font-family: var(--font);
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.preset-chip:hover { border-color: var(--b2); color: var(--text2); background: rgba(255,255,255,0.04); }

/* Speak button */
.speak-btn {
  width: 100%;
  padding: 15px;
  background: var(--gold);
  color: #000;
  border: none;
  border-radius: 14px;
  font-family: var(--font);
  font-size: 16px;
  font-weight: 900;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: transform 0.13s, box-shadow 0.15s, background 0.15s;
  box-shadow: 0 4px 20px rgba(212,168,67,0.2);
  letter-spacing: -0.3px;
}
.speak-btn:active { transform: scale(0.97); }
.speak-btn:hover { box-shadow: 0 6px 28px rgba(212,168,67,0.35); }
.speak-btn.female {
  background: var(--teal);
  box-shadow: 0 4px 20px rgba(42,181,168,0.2);
}
.speak-btn.female:hover { box-shadow: 0 6px 28px rgba(42,181,168,0.35); }
.speak-btn.speaking { opacity: 0.7; cursor: default; }

/* Stop button */
.stop-btn {
  width: 100%;
  padding: 12px;
  background: transparent;
  color: var(--text3);
  border: 1px solid var(--border);
  border-radius: 12px;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 8px;
  transition: color 0.15s, border-color 0.15s;
  display: none;
}
.stop-btn.visible { display: block; }
.stop-btn:hover { color: var(--coral); border-color: var(--coral); }

/* Status box */
.status-box {
  margin-top: 20px;
  padding: 14px 16px;
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: 14px;
  font-size: 12px;
  color: var(--text3);
  line-height: 1.6;
  min-height: 56px;
  transition: border-color 0.2s;
}
.status-box.ok   { border-color: rgba(52,211,153,0.3); color: var(--green); }
.status-box.err  { border-color: rgba(232,104,90,0.3); color: var(--coral); }
.status-box.info { border-color: var(--gold-br); color: var(--gold); }

/* Voices list */
.voices-section { margin-top: 24px; }
.voices-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 10px;
}
.voices-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 200px;
  overflow-y: auto;
  scrollbar-width: thin;
}
.voice-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.voice-item:hover { border-color: var(--b2); background: rgba(255,255,255,0.03); }
.voice-item.active { border-color: var(--gold); background: var(--gold-bg); }
.voice-name { font-size: 12px; font-weight: 600; color: var(--text2); }
.voice-item.active .voice-name { color: var(--gold); }
.voice-lang { font-size: 10px; color: var(--text3); }
.voice-play { font-size: 14px; opacity: 0.5; }

.divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

/* wave animation */
@keyframes wave {
  0%, 100% { transform: scaleY(1); }
  50% { transform: scaleY(2.5); }
}
.wave-wrap {
  display: none;
  align-items: center;
  gap: 3px;
  height: 18px;
}
.wave-wrap.visible { display: flex; }
.wave-bar {
  width: 3px;
  height: 8px;
  background: currentColor;
  border-radius: 2px;
  animation: wave 0.8s ease-in-out infinite;
}
.wave-bar:nth-child(2) { animation-delay: 0.1s; }
.wave-bar:nth-child(3) { animation-delay: 0.2s; }
.wave-bar:nth-child(4) { animation-delay: 0.1s; }
.wave-bar:nth-child(5) { animation-delay: 0.0s; }
</style>
</head>
<body>
<div class="card">
  <div class="title">בדיקת <em>קול עברי</em></div>
  <div class="subtitle">Web Speech API — ישירות מהדפדפן, ללא שרת</div>

  <div class="text-label">בחר מין קורא</div>
  <div class="gender-row">
    <button class="gender-btn selected" id="btn-male" onclick="selectGender('male')">
      <span class="gender-icon">👨</span>
      גבר
    </button>
    <button class="gender-btn female" id="btn-female" onclick="selectGender('female')">
      <span class="gender-icon">👩</span>
      אישה
    </button>
  </div>

  <div class="text-label">טקסט לקריאה</div>
  <textarea id="tts-text" rows="3">שלום! אני הדמות המלווה שלך במשחק דילמות. בוא נתחיל!</textarea>

  <div class="presets-label">טקסטים לדוגמא</div>
  <div class="presets-row" id="presets"></div>

  <button class="speak-btn" id="speak-btn" onclick="speak()">
    <div class="wave-wrap" id="wave">
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>
    <span id="speak-label">▶ השמע קול</span>
  </button>
  <button class="stop-btn" id="stop-btn" onclick="stopSpeaking()">■ עצור</button>

  <div class="status-box" id="status">טוען קולות...</div>

  <div class="divider"></div>

  <div class="voices-section">
    <div class="voices-title">קולות עבריים זמינים במכשיר שלך</div>
    <div class="voices-list" id="voices-list">
      <div style="color:var(--text3);font-size:12px;padding:8px 0">בודק...</div>
    </div>
  </div>
</div>

<script>
const PRESETS = [
  'שלום! אני הדמות המלווה שלך.',
  'מצאת ארנק עם מאתיים שקל ואין בו תעודת זהות. מה עושים?',
  'ראית את החבר שלך מעתיק במבחן. מה עושים?',
  'גם אמא וגם בנה בחרו אותו דבר — הסכמה מלאה!',
];

let selectedGender = 'male';
let allVoices = [];
let speaking = false;

// Presets
const presetsEl = document.getElementById('presets');
PRESETS.forEach(p => {
  const chip = document.createElement('button');
  chip.className = 'preset-chip';
  chip.textContent = p.slice(0, 22) + (p.length > 22 ? '…' : '');
  chip.title = p;
  chip.onclick = () => { document.getElementById('tts-text').value = p; };
  presetsEl.appendChild(chip);
});

function selectGender(g) {
  selectedGender = g;
  document.getElementById('btn-male').classList.toggle('selected', g === 'male');
  document.getElementById('btn-female').classList.toggle('selected', g === 'female');
  const speakBtn = document.getElementById('speak-btn');
  speakBtn.classList.toggle('female', g === 'female');
  renderVoices();
}

function loadVoices() {
  allVoices = window.speechSynthesis.getVoices();
  renderVoices();
  updateStatus();
}

function getHebrewVoices() {
  return allVoices.filter(v => v.lang && v.lang.toLowerCase().startsWith('he'));
}

function getBestVoice(gender) {
  const he = getHebrewVoices();
  if (he.length === 0) return null;

  // Try to detect gender from voice name
  const femaleKeywords = ['female','woman','girl','נשי','f','miriam','carmit','tami','dana','sarah'];
  const maleKeywords   = ['male','man','boy','גברי','m','yosef','yonatan','ronen','aaron'];

  if (gender === 'female') {
    const found = he.find(v => femaleKeywords.some(k => v.name.toLowerCase().includes(k)));
    return found || he[0];
  } else {
    const found = he.find(v => maleKeywords.some(k => v.name.toLowerCase().includes(k)));
    return found || he[0];
  }
}

function renderVoices() {
  const list = document.getElementById('voices-list');
  const heVoices = getHebrewVoices();
  const best = getBestVoice(selectedGender);

  if (heVoices.length === 0) {
    list.innerHTML = `<div style="color:var(--coral);font-size:12px;padding:8px 0">⚠️ לא נמצאו קולות עבריים במכשיר זה</div>`;
    return;
  }

  list.innerHTML = '';
  heVoices.forEach(v => {
    const item = document.createElement('div');
    item.className = 'voice-item' + (v === best ? ' active' : '');
    item.innerHTML = `
      <div>
        <div class="voice-name">${v.name}</div>
        <div class="voice-lang">${v.lang} ${v.localService ? '· מקומי' : '· רשת'}</div>
      </div>
      <span class="voice-play">▶</span>
    `;
    item.onclick = () => {
      // Play this specific voice
      window.speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(document.getElementById('tts-text').value || 'שלום');
      utt.voice = v;
      utt.lang = v.lang;
      utt.rate = 0.88;
      window.speechSynthesis.speak(utt);
    };
    list.appendChild(item);
  });
}

function updateStatus() {
  const statusEl = document.getElementById('status');
  const heVoices = getHebrewVoices();
  const total = allVoices.length;

  if (heVoices.length === 0) {
    statusEl.className = 'status-box err';
    statusEl.textContent = `⚠️ לא נמצאו קולות עבריים. נמצאו ${total} קולות אחרים. ייתכן שצריך להוריד חבילת קולות עברית בהגדרות המכשיר.`;
  } else {
    statusEl.className = 'status-box ok';
    statusEl.textContent = `✓ נמצאו ${heVoices.length} קולות עבריים מתוך ${total} קולות כולל. לחץ על קול ברשימה כדי לשמוע אותו, או לחץ השמע קול למיטבי.`;
  }
}

function speak() {
  if (speaking) return;
  const text = document.getElementById('tts-text').value.trim();
  if (!text) return;

  const voice = getBestVoice(selectedGender);
  const statusEl = document.getElementById('status');

  if (!voice) {
    statusEl.className = 'status-box err';
    statusEl.textContent = '⚠️ לא נמצא קול עברי. נסה להוריד חבילת קולות עברית בהגדרות המכשיר שלך.';
    return;
  }

  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.voice = voice;
  utt.lang = voice.lang;
  utt.rate = 0.88;
  utt.pitch = selectedGender === 'female' ? 1.1 : 0.9;

  speaking = true;
  const speakBtn = document.getElementById('speak-btn');
  const stopBtn = document.getElementById('stop-btn');
  const wave = document.getElementById('wave');
  const label = document.getElementById('speak-label');

  speakBtn.classList.add('speaking');
  wave.classList.add('visible');
  label.textContent = 'מדבר...';
  stopBtn.classList.add('visible');

  statusEl.className = 'status-box info';
  statusEl.textContent = `🔊 מדבר בקול: ${voice.name}`;

  utt.onend = () => {
    speaking = false;
    speakBtn.classList.remove('speaking');
    wave.classList.remove('visible');
    label.textContent = '▶ השמע קול';
    stopBtn.classList.remove('visible');
    statusEl.className = 'status-box ok';
    statusEl.textContent = `✓ הושמע בהצלחה — קול: ${voice.name}`;
  };
  utt.onerror = () => {
    speaking = false;
    speakBtn.classList.remove('speaking');
    wave.classList.remove('visible');
    label.textContent = '▶ השמע קול';
    stopBtn.classList.remove('visible');
    statusEl.className = 'status-box err';
    statusEl.textContent = '⚠️ שגיאה בהשמעת הקול.';
  };

  window.speechSynthesis.speak(utt);
}

function stopSpeaking() {
  window.speechSynthesis.cancel();
  speaking = false;
  document.getElementById('speak-btn').classList.remove('speaking');
  document.getElementById('wave').classList.remove('visible');
  document.getElementById('speak-label').textContent = '▶ השמע קול';
  document.getElementById('stop-btn').classList.remove('visible');
}

// Load voices
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = loadVoices;
  loadVoices();
  setTimeout(loadVoices, 500); // fallback for some browsers
} else {
  document.getElementById('status').className = 'status-box err';
  document.getElementById('status').textContent = '⚠️ הדפדפן שלך לא תומך ב-Web Speech API.';
}
</script>
</body>
</html>
