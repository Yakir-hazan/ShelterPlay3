<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בדיקת TTS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent: #7c6af7;
    --accent2: #4fc3f7;
    --text: #e8e8f0;
    --muted: #6b6b80;
  }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    width: 100%;
    max-width: 520px;
    box-shadow: 0 0 60px rgba(124,106,247,0.08);
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 800;
    margin-bottom: 6px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .sub {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 28px;
  }

  label {
    display: block;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 1rem;
    padding: 14px 16px;
    resize: vertical;
    min-height: 100px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 20px;
  }

  textarea:focus { border-color: var(--accent); }

  .voices {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 24px;
  }

  .voice-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    padding: 10px 6px;
    cursor: pointer;
    font-family: 'Heebo', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    text-align: center;
    transition: all 0.2s;
  }

  .voice-btn:hover { border-color: var(--accent); color: var(--text); }

  .voice-btn.active {
    border-color: var(--accent);
    background: rgba(124,106,247,0.15);
    color: var(--accent);
  }

  .voice-icon { font-size: 1.2rem; display: block; margin-bottom: 3px; }

  .play-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #9c8af7);
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'Heebo', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    padding: 15px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .play-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .play-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .status {
    margin-top: 16px;
    text-align: center;
    font-size: 0.85rem;
    color: var(--muted);
    min-height: 20px;
  }

  .status.error { color: #f77; }
  .status.ok { color: #7f7; }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <h1>🎙️ בדיקת TTS</h1>
  <p class="sub">מחובר לשרת ShelterPlay · OpenAI TTS</p>

  <label>טקסט לנגינה</label>
  <textarea id="text">שלום! זוהי בדיקה של מערכת הקריינות. הקול נוצר על ידי OpenAI ומגיע דרך השרת שלנו.</textarea>

  <label>בחר קול</label>
  <div class="voices">
    <button class="voice-btn active" data-voice="nova"><span class="voice-icon">👩</span>nova</button>
    <button class="voice-btn" data-voice="alloy"><span class="voice-icon">🤖</span>alloy</button>
    <button class="voice-btn" data-voice="shimmer"><span class="voice-icon">✨</span>shimmer</button>
    <button class="voice-btn" data-voice="echo"><span class="voice-icon">👨</span>echo</button>
    <button class="voice-btn" data-voice="fable"><span class="voice-icon">📖</span>fable</button>
    <button class="voice-btn" data-voice="onyx"><span class="voice-icon">🎵</span>onyx</button>
  </div>

  <button class="play-btn" id="playBtn" onclick="speak()">
    ▶ נגן
  </button>

  <div class="status" id="status"></div>
</div>

<script>
  const SERVER = 'https://shelterplay.onrender.com';
  let selectedVoice = 'nova';
  let currentAudio = null;

  document.querySelectorAll('.voice-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.voice-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedVoice = btn.dataset.voice;
    });
  });

  async function speak() {
    const text = document.getElementById('text').value.trim();
    if (!text) return;

    const btn = document.getElementById('playBtn');
    const status = document.getElementById('status');

    if (currentAudio) { currentAudio.pause(); currentAudio = null; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> טוען...';
    status.textContent = 'מתחבר לשרת...';
    status.className = 'status';

    try {
      const res = await fetch(`${SERVER}/tts`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, voice: selectedVoice })
      });

      if (!res.ok) {
        const err = await res.text();
        throw new Error(err || `שגיאה ${res.status}`);
      }

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      currentAudio = new Audio(url);
      currentAudio.play();
      status.textContent = `✓ מנגן בקול ${selectedVoice}`;
      status.className = 'status ok';

      currentAudio.onended = () => {
        btn.disabled = false;
        btn.innerHTML = '▶ נגן';
      };
    } catch (e) {
      status.textContent = '❌ ' + e.message;
      status.className = 'status error';
      btn.disabled = false;
      btn.innerHTML = '▶ נגן';
    }
  }
</script>
</body>
</html>
